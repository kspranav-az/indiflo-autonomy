fake_odom_node:
  ros__parameters:
    odom_topic: /unitree_go2/odom
    frame_id: odom
    child_frame_id: base_link
    publish_rate: 30.0
    publish_tf: true

    # Initial pose
    init_x: 0.0
    init_y: 0.0
    init_z: 0.0
    init_roll: 0.0
    init_pitch: 0.0
    init_yaw: 0.0

    # Constant velocity (set to 0 for a static robot)
    linear_x: 0.0
    linear_y: 0.0
    linear_z: 0.0
    angular_x: 0.0
    angular_y: 0.0
    angular_z: 0.0
