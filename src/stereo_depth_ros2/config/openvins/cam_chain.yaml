%YAML:1.0

# IMPORTANT: T_imu_cam was computed from the observed stationary gravity vector
# and the left/right motion direction.
#
# Observed IMU frame (chip / breakout board):
#   y ≈ +9.4  -> UP
#   z spikes positive when moving forward
#   x goes negative when moving left  -> x points RIGHT
#
# Camera optical frame (standard):
#   x = RIGHT, y = DOWN, z = FORWARD (horizontal)
#
# The rotation below maps:
#   IMU x (right) -> camera x (right)
#   IMU y (up)    -> camera -y (down)
#   horizontal forward -> camera z (forward)
# and removes the ~13° pitch of the IMU relative to the horizontal camera.
#
# OpenVINS prints "camX extrinsics" as T_CXtoI (rotation from IMU to camera).
# We therefore specify T_imu_cam directly.

cam0:
  T_imu_cam:
    - [0.999785, 0.020737, 0.000000, 0.000000]
    - [-0.020215, 0.974617, -0.222966, 0.000000]
    - [-0.004624, 0.222918, 0.974826, 0.000000]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  cam_overlaps: [1]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [432.4551801426587, 432.4551801426587, 320.0, 240.0]
  resolution: [640, 480]
  rostopic: /camera/left/image_raw
  timeshift_cam_imu: 0.0

cam1:
  T_imu_cam:
    - [0.994067, 0.022863, 0.106343, 0.059437]
    - [0.018952, 0.926299, -0.376312, 0.002584]
    - [-0.107109, 0.376095, 0.920370, -0.007786]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  T_cn_cnm1:
    - [0.993964942878298, 0.0152082626039648, -0.108638856204908, -0.0599667900084190]
    - [0.00239482340933451, 0.987098867993203, 0.160094002471595, -0.000824591778318880]
    - [0.109672043610849, -0.159387996897839, 0.981105248836797, 0.00181773058655682]
    - [0.0, 0.0, 0.0, 1.0]
  cam_overlaps: [0]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [432.4551801426587, 432.4551801426587, 320.0, 240.0]
  resolution: [640, 480]
  rostopic: /stereo/right/image_raw
  timeshift_cam_imu: 0.0
