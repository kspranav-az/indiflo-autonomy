%YAML:1.0

# IMPORTANT: T_imu_cam was computed from the observed stationary gravity vector
# and the forward-motion direction.
#
# Observed IMU frame:
#   y ≈ +9.4  -> UP
#   z spikes positive when moving forward
#   x goes negative when moving left
#
# This makes the IMU axes approximately:
#   x = RIGHT, y = UP, z = FORWARD-UP (tilted ~13° from horizontal)
#
# Camera optical frame is x-right, y-down, z-forward (horizontal).
# The rotation below maps the IMU frame to the camera frame, removing the tilt.
#
# OpenVINS prints "camX extrinsics" as T_CXtoI (rotation from IMU to camera).
# We therefore specify T_imu_cam directly.

cam0:
  T_imu_cam:
    - [0.999774, 0.020737, -0.004742, 0.000000]
    - [-0.021272, 0.974617, -0.222867, 0.000000]
    - [-0.000000, 0.222918, 0.974837, 0.000000]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  cam_overlaps: [1]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [432.4551801426587, 432.4551801426587, 320.0, 240.0]
  resolution: [640, 480]
  rostopic: /camera/left/image_raw
  timeshift_cam_imu: 0.0

cam1:
  T_imu_cam:
    - [0.994571, 0.022104, 0.101690, 0.059475]
    - [0.017891, 0.926312, -0.376331, 0.002521]
    - [-0.102515, 0.376107, 0.920888, -0.007511]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  T_cn_cnm1:
    - [0.993964942878298, 0.0152082626039648, -0.108638856204908, -0.0599667900084190]
    - [0.00239482340933451, 0.987098867993203, 0.160094002471595, -0.000824591778318880]
    - [0.109672043610849, -0.159387996897839, 0.981105248836797, 0.00181773058655682]
    - [0.0, 0.0, 0.0, 1.0]
  cam_overlaps: [0]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [432.4551801426587, 432.4551801426587, 320.0, 240.0]
  resolution: [640, 480]
  rostopic: /stereo/right/image_raw
  timeshift_cam_imu: 0.0
