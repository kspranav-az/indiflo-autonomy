%YAML:1.0

# IMPORTANT: T_imu_cam matches the physical mounting described by the user:
#   IMU x = left, IMU y = up, IMU z = forward (along the camera optical axis).
# The camera module is tilted together with the IMU.
# Camera optical frame is x-right, y-down, z-forward.
# Therefore:
#   camera x = -IMU x
#   camera y = -IMU y
#   camera z =  IMU z
# which is a 180-degree rotation around the optical (z) axis.
#
# OpenVINS prints "camX extrinsics" as T_CXtoI (rotation from IMU to camera).
# We therefore specify T_imu_cam directly.
#
# Intrinsics updated from stereo_calib.yml (2026-07-03):
#   image_width: 640, image_height: 480, board: 7x5, square: 29.0 mm
#   Calibration RMS error: 1.03821 pixels
#   K1 fx=415.10 fy=420.31 cx=355.06 cy=221.25
#   K2 fx=418.75 fy=419.11 cx=316.57 cy=264.48
#   T baseline = [-60.97 mm, -0.04 mm, 0.62 mm]

# cam0 = physical LEFT (sensor-id=1 in calibrate_stereo.cpp)
cam0:
  T_imu_cam:
    - [-1.000000, 0.000000, 0.000000, 0.000000]
    - [0.000000, -1.000000, 0.000000, 0.000000]
    - [0.000000, 0.000000, 1.000000, 0.000000]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  cam_overlaps: [1]
  camera_model: pinhole
  distortion_model: radtan
  distortion_coeffs: [-0.036631, 0.110057, 0.0, 0.0, -0.129929]
  intrinsics: [415.10088390587896, 420.3083743120701, 355.0629519886139, 221.24727741856475]
  resolution: [640, 480]
  rostopic: /camera/left/image_raw
  timeshift_cam_imu: 0.0

# cam1 = physical RIGHT (sensor-id=0 in calibrate_stereo.cpp)
cam1:
  T_imu_cam:
    - [-1.000000, 0.000000, 0.000000, 0.000000]
    - [0.000000, -1.000000, 0.000000, 0.000000]
    - [0.000000, 0.000000, 1.000000, 0.000000]
    - [0.000000, 0.000000, 0.000000, 1.000000]
  T_cn_cnm1:
    - [0.9999999648342447, 0.000106147991258389, -0.000243047767526018, 0.06096922451193947]
    - [-0.000107247796424433, 0.999989734488182, -0.00452986212364622, -0.0000412574389159956]
    - [0.000242547767526018, 0.00452983621839189, 0.9999897107069258, -0.00000622095234173209]
    - [0.0, 0.0, 0.0, 1.0]
  cam_overlaps: [0]
  camera_model: pinhole
  distortion_model: radtan
  distortion_coeffs: [-0.042143, 0.059464, 0.0, 0.0, -0.035500]
  intrinsics: [418.7519205086613, 419.1075166680335, 316.5721852132701, 264.4844836729405]
  resolution: [640, 480]
  rostopic: /stereo/right/image_raw
  timeshift_cam_imu: 0.0
